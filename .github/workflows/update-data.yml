name: Update Kickbase Data

on:
  push:
    branches: [ main ]
  schedule:
    # Test-Lauf heute um 12:15 Uhr Lokalzeit (10:15 UTC)
    - cron: '15 10 * * *'
    # Freitag 23:32 (Local) -> 21:32 UTC
    - cron: '32 21 * * 5'
    # Samstag 18:32 (Local) -> 16:32 UTC
    - cron: '32 16 * * 6'
    # Samstag 21:32 (Local) -> 19:32 UTC
    - cron: '32 19 * * 6'
    # Sonntag 20:32 (Local) -> 18:32 UTC
    - cron: '32 18 * * 0'
    # Montag 18:07 (Local) -> 16:07 UTC
    - cron: '7 16 * * 1'
  workflow_dispatch: {}
    # Erlaubt manuelles Auslösen des Workflows

jobs:
  update-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        working-directory: ./backend
        run: npm install

      - name: Fetch Kickbase Data
        working-directory: ./backend
        run: node scripts/fetch-data.js
        env:
          KICKBASE_EMAIL: ${{ secrets.KICKBASE_EMAIL }}
          KICKBASE_PASS: ${{ secrets.KICKBASE_PASS }}
          KICKBASE_EMAIL_2: ${{ secrets.KICKBASE_EMAIL_2 }}
          KICKBASE_PASS_2: ${{ secrets.KICKBASE_PASS_2 }}

      - name: Commit and Push Data
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add frontend/public/data.json
          git commit -m "Automatisches Update: Kickbase Daten [skip ci]" || echo "Keine Änderungen zu commiten"
          git push
