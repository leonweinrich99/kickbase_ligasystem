name: Update Kickbase Data

on:
  push:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      snapshot:
        description: 'Snapshot erstellen'
        required: false
        default: 'false'

jobs:
  update-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        working-directory: ./backend
        run: npm install

      - name: Fetch Kickbase Data
        working-directory: ./backend
        run: node scripts/fetch-data.js
        env:
          KICKBASE_EMAIL: ${{ secrets.KICKBASE_EMAIL }}
          KICKBASE_PASS: ${{ secrets.KICKBASE_PASS }}
          KICKBASE_EMAIL_2: ${{ secrets.KICKBASE_EMAIL_2 }}
          KICKBASE_PASS_2: ${{ secrets.KICKBASE_PASS_2 }}
          SNAPSHOT: ${{ github.event.inputs.snapshot || 'false' }}

      - name: Commit and Push Data
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add frontend/public/data.json frontend/public/history/
          git commit -m "Automatisches Update: Kickbase Daten & Historie [skip ci]" || echo "Keine Änderungen zu commiten"
          git push
