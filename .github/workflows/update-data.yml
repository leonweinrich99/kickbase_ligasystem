name: Update Kickbase Data

on:
  push:
    branches: [ main ]
  schedule:
    # Freitag 23:30 (Local) -> 21:30 UTC
    - cron: '30 21 * * 5'
    # Samstag 18:30 (Local) -> 16:30 UTC
    - cron: '30 16 * * 6'
    # Samstag 21:30 (Local) -> 19:30 UTC
    - cron: '30 19 * * 6'
    # Sonntag 20:30 (Local) -> 18:30 UTC
    - cron: '30 18 * * 0'
    # Montag 18:05 (Local) -> 16:05 UTC
    - cron: '5 16 * * 1'
  workflow_dispatch:
    # Erlaubt manuelles Auslösen des Workflows

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        working-directory: ./backend
        run: npm install

      - name: Fetch Kickbase Data
        working-directory: ./backend
        run: node scripts/fetch-data.js
        env:
          KICKBASE_EMAIL: ${{ secrets.KICKBASE_EMAIL }}
          KICKBASE_PASS: ${{ secrets.KICKBASE_PASS }}
          KICKBASE_EMAIL_2: ${{ secrets.KICKBASE_EMAIL_2 }}
          KICKBASE_PASS_2: ${{ secrets.KICKBASE_PASS_2 }}

      - name: Commit and Push Data
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add frontend/public/data.json
          git commit -m "Automatisches Update: Kickbase Daten" || echo "Keine Änderungen zu commiten"
          git push
